# ===== Server =====
server.port=8080

# ===== MySQL Database =====
spring.datasource.url=jdbc:mysql://localhost:3306/vericodedb
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===== CORS (allow React frontend on port 3000) =====
app.cors.allowed-origins=http://localhost:3000

# ===== External Checker Microservices =====
checker.python.url=http://localhost:5001/check
checker.js.url=http://localhost:5002/check