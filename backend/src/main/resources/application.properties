# ===== Server =====
server.port=8080

# ===== MySQL Database =====
spring.datasource.url=jdbc:mysql://localhost:3306/vericodedb?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===== CORS (allow React frontend on port 3000) =====
app.cors.allowed-origins=http://localhost:3000

# ===== External Checker Microservices =====
checker.python.url=http://localhost:5001/check
checker.js.url=http://localhost:5002/check

# ===== Email (Mailtrap SMTP sandbox) =====
# Sign up at https://mailtrap.io → Email Testing → Inboxes → SMTP Settings
spring.mail.host=sandbox.smtp.mailtrap.io
spring.mail.port=2525
spring.mail.username=${MAILTRAP_USERNAME}
spring.mail.password=${MAILTRAP_PASSWORD}
spring.config.import=optional:file:./local.properties
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=noreply@vericode.dev