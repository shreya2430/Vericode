# ===== Server =====
server.port=8080

# ===== H2 Database (file mode for demo reliability) =====
spring.datasource.url=jdbc:h2:file:./data/vericodedb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ===== JPA / Hibernate =====
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.sql.init.continue-on-error=false

# ===== H2 Console (dev only) =====
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===== CORS (allow React frontend on port 3000) =====
app.cors.allowed-origins=http://localhost:3000

# ===== External Checker Microservices =====
checker.python.url=http://localhost:5001/check
checker.js.url=http://localhost:5002/check